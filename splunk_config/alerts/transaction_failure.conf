# THREAD — Transaction Failure Alert
# Import into Splunk: Settings → Searches, Reports & Alerts → New Alert
# Or place this file in $SPLUNK_HOME/etc/apps/<your_app>/local/savedsearches.conf
#
# ── Alert configuration ───────────────────────────────────────────────────────

[THREAD - Transaction Failure]
# SPL search — dedup ensures one alert fires per unique correlationId
search = index=thread_logs sourcetype="thread:transaction" traceEvent=REQUEST_ERROR \
         | dedup correlationId \
         | table correlationId, sourceService, targetService, errorMessage, _time

# Real-time alert, evaluates continuously
dispatch.earliest_time = rt
dispatch.latest_time   = rt+1s
alert_type             = number of events
alert_comparator       = greater than
alert_threshold        = 0
alert.suppress         = 0
alert.track            = 1
counttype              = number of events
relation               = greater than
quantity               = 0

# Trigger once per result so each failing correlationId gets its own alert
alert.digest_mode      = false
alert.expires          = 24h

# ── Webhook action ────────────────────────────────────────────────────────────
# URL for local dev; swap to http://thread-platform:9000/splunk/alert in Docker
action.webhook         = 1
action.webhook.param.url = http://localhost:9000/splunk/alert

# Payload template — Splunk substitutes $result.*$ tokens at fire-time
action.webhook.param.payload = {
  "correlation_id": "$result.correlationId$",
  "service_name":   "$result.sourceService$",
  "error_message":  "$result.errorMessage$",
  "timestamp":      "$result._time$"
}

# ── Verification SPL (paste into Splunk Search to confirm alert fires) ────────
# index=thread_logs traceEvent=REQUEST_ERROR
# | dedup correlationId
# | table correlationId, sourceService, targetService, errorMessage, _time
