services:
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: thread-rabbitmq
    ports:
      - "5672:5672" # AMQP
      - "15672:15672" # Management UI → http://localhost:15672
    environment:
      RABBITMQ_DEFAULT_USER: thread
      RABBITMQ_DEFAULT_PASS: "${RABBITMQ_PASSWORD}"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  order-service:
    build: ./demo_services/order_service
    container_name: thread-order
    ports:
      - "8001:8001"
    environment:
      SERVICE_NAME: order-service
      SERVICE_BASE_URL: http://order-service:8001
      SPLUNK_HEC_URL: https://prd-p-pxen4.splunkcloud.com:8088
      SPLUNK_HEC_TOKEN: "${SPLUNK_HEC_TOKEN}"
      SPLUNK_INDEX: thread_logs
      PAYMENT_SERVICE_URL: http://payment-service:8002
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: thread
      RABBITMQ_PASSWORD: "${RABBITMQ_PASSWORD}"
      THREAD_LOGS_QUEUE: thread_logs_queue
    depends_on:
      rabbitmq:
        condition: service_healthy

  payment-service:
    build: ./demo_services/payment_service
    container_name: thread-payment
    ports:
      - "8002:8002"
    environment:
      SERVICE_NAME: payment-service
      SERVICE_BASE_URL: http://payment-service:8002
      SPLUNK_HEC_URL: https://prd-p-pxen4.splunkcloud.com:8088
      SPLUNK_HEC_TOKEN: "${SPLUNK_HEC_TOKEN}"
      SPLUNK_INDEX: thread_logs
      INVENTORY_SERVICE_URL: http://inventory-service:8003
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: thread
      RABBITMQ_PASSWORD: "${RABBITMQ_PASSWORD}"
      THREAD_LOGS_QUEUE: thread_logs_queue
      SIMULATE_FAILURE: "${SIMULATE_FAILURE:-false}"
    depends_on:
      rabbitmq:
        condition: service_healthy

  inventory-service:
    build: ./demo_services/inventory_service
    container_name: thread-inventory
    ports:
      - "8003:8003"
    environment:
      SERVICE_NAME: inventory-service
      SERVICE_BASE_URL: http://inventory-service:8003
      SPLUNK_HEC_URL: https://prd-p-pxen4.splunkcloud.com:8088
      SPLUNK_HEC_TOKEN: "${SPLUNK_HEC_TOKEN}"
      SPLUNK_INDEX: thread_logs
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: thread
      RABBITMQ_PASSWORD: "${RABBITMQ_PASSWORD}"
      THREAD_LOGS_QUEUE: thread_logs_queue
    depends_on:
      rabbitmq:
        condition: service_healthy

  thread-platform:
    build:
      context: .
      dockerfile: thread_platform/Dockerfile
    container_name: thread-platform
    ports:
      - "9000:9000"
    environment:
      # Splunk Cloud
      SPLUNK_HOST: prd-p-pxen4.splunkcloud.com
      SPLUNK_PORT: 8089
      SPLUNK_HEC_URL: https://prd-p-pxen4.splunkcloud.com:8088
      SPLUNK_HEC_TOKEN: "${SPLUNK_HEC_TOKEN}"
      SPLUNK_INDEX: thread_logs
      SPLUNK_BASE_URL: https://prd-p-pxen4.splunkcloud.com
      SPLUNK_MCP_URL: https://prd-p-pxen4.splunkcloud.com/en-US/splunkd/__raw/services/mcp
      SPLUNK_MCP_TOKEN: "${SPLUNK_MCP_TOKEN}"
      SPLUNK_MCP_INSECURE: "false"
      SPLUNK_USERNAME: sc_admin
      SPLUNK_PASSWORD: "${SPLUNK_PASSWORD}"
      SPLUNK_AI_ENABLED: "true"
      # RabbitMQ
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: thread
      RABBITMQ_PASSWORD: "${RABBITMQ_PASSWORD}"
      THREAD_LOGS_QUEUE: thread_logs_queue
      SLACK_MESSAGES_QUEUE: slack_messages_queue
      # Slack
      SLACK_BOT_TOKEN: "${SLACK_BOT_TOKEN}"
      SLACK_SIGNING_SECRET: "${SLACK_SIGNING_SECRET}"
      SLACK_APP_TOKEN: "${SLACK_APP_TOKEN}"
      SLACK_SOCKET_MODE: "true"
      SLACK_ALERT_CHANNEL: "#thread-alerts"
      # Platform
      PLATFORM_PORT: 9000
      PLATFORM_ENV: production
      PYTHONUNBUFFERED: "1"
      GROQ_API_KEY: "${GROQ_API_KEY}"
      # Service URLs (for replay SSRF allowlist)
      ORDER_SERVICE_URL: http://order-service:8001
      PAYMENT_SERVICE_URL: http://payment-service:8002
      INVENTORY_SERVICE_URL: http://inventory-service:8003
      SQLITE_PATH: /data/thread_store.db
    volumes:
      - thread_data:/data
    depends_on:
      rabbitmq:
        condition: service_healthy

volumes:
  rabbitmq_data:
  thread_data:
